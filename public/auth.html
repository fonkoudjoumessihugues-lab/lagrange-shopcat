<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lagrange Shop - Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --primary: #6D28D9; --primary-dark: #4C1D95; --primary-light: #7C3AED;
      --primary-gradient: linear-gradient(135deg, #4C1D95 0%, #7C3AED 100%);
      --bg-primary: #0A0A0F; --bg-secondary: #14141D;
      --bg-card: rgba(255,255,255,0.05);
      --text-primary: #F8FAFC; --text-secondary: #94A3B8; --text-muted: #64748B;
      --border-color: rgba(255,255,255,0.06);
      --shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
      --radius: 24px; --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh; display:flex; align-items:center; justify-content:center;
      background: var(--bg-primary); padding:20px; position:relative; overflow:hidden;
    }
    body::before {
      content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
      background: radial-gradient(ellipse at 20% 50%, rgba(109,40,217,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 50%, rgba(124,58,237,0.05) 0%, transparent 60%);
      z-index:0; pointer-events:none; animation:bgFloat 60s ease-in-out infinite alternate;
    }
    @keyframes bgFloat { 0% { transform:translate(0,0) scale(1); } 100% { transform:translate(-2%,2%) scale(1.05); } }
    .auth-container {
      background: var(--bg-secondary); border-radius: var(--radius);
      padding: 48px 40px; width:100%; max-width:440px;
      border:1px solid var(--border-color); box-shadow:var(--shadow);
      position:relative; z-index:1; animation:slideUp 0.6s ease;
      backdrop-filter:blur(20px);
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(30px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
    .auth-header { text-align:center; margin-bottom:36px; }
    .auth-header .logo { font-size:56px; display:block; margin-bottom:8px; animation:pulseLogo 3s ease-in-out infinite; }
    @keyframes pulseLogo { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
    .auth-header h1 { font-size:28px; font-weight:900; background:var(--primary-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-0.5px; }
    .auth-header p { color:var(--text-muted); font-size:14px; margin-top:4px; -webkit-text-fill-color:var(--text-muted); }
    .form-group { margin-bottom:20px; position:relative; }
    .form-group label { display:block; font-weight:600; color:var(--text-secondary); margin-bottom:6px; font-size:13px; letter-spacing:0.5px; }
    .form-group .input-icon { position:relative; }
    .form-group .input-icon i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:16px; transition:var(--transition); }
    .form-group input { width:100%; padding:12px 16px 12px 44px; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:15px; transition:var(--transition); background:rgba(255,255,255,0.03); color:var(--text-primary); font-family:'Inter',sans-serif; }
    .form-group input:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,0.06); box-shadow:0 0 0 4px rgba(109,40,217,0.1); }
    .form-group input::placeholder { color:var(--text-muted); }
    .btn-auth { width:100%; padding:14px; background:var(--primary-gradient); color:white; border:none; border-radius:var(--radius-sm); font-size:16px; font-weight:700; cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; margin-top:4px; box-shadow:0 4px 20px rgba(109,40,217,0.3); }
    .btn-auth:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(109,40,217,0.4); }
    .btn-auth:active { transform:translateY(0) scale(0.98); }
    .btn-auth:disabled { opacity:0.6; cursor:not-allowed; }
    .auth-switch { text-align:center; margin-top:20px; color:var(--text-muted); font-size:14px; }
    .auth-switch a { color:var(--primary-light); text-decoration:none; font-weight:600; transition:var(--transition); }
    .auth-switch a:hover { color:white; }
    .promo-code { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); border-radius:var(--radius-sm); padding:12px 16px; text-align:center; font-size:13px; color:var(--text-secondary); margin-bottom:20px; }
    .promo-code strong { color:#10B981; font-weight:700; }
    .alert { padding:12px 16px; border-radius:var(--radius-sm); margin-bottom:16px; font-size:14px; display:none; }
    .alert-error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#EF4444; }
    .alert-success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#10B981; }
    .password-toggle { position:absolute; right:14px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--text-muted); background:none; border:none; font-size:16px; transition:var(--transition); }
    .password-toggle:hover { color:var(--text-primary); }
    .loading-spinner { display:inline-block; width:20px; height:20px; border:3px solid rgba(255,255,255,0.2); border-radius:50%; border-top-color:white; animation:spin 0.8s linear infinite; margin-right:8px; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (max-width:480px) { .auth-container { padding:32px 20px; } .auth-header h1 { font-size:24px; } }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-header">
    <span class="logo">🛒</span>
    <h1>Lagrange Shop</h1>
    <p>Manager Pro</p>
  </div>
  <div id="alertMessage" class="alert"></div>
  <div id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <div class="input-icon"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="votre@email.com" autofocus></div>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-icon">
        <i class="fas fa-lock"></i>
        <input type="password" id="loginPassword" placeholder="••••••••">
        <button class="password-toggle" type="button" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <button class="btn-auth" id="loginBtn" onclick="login()"><i class="fas fa-sign-in-alt"></i> Se connecter</button>
    <div class="auth-switch">Pas encore de compte ? <a href="#" onclick="showRegister()">S'inscrire</a></div>
  </div>
  <div id="registerForm" style="display:none;">
    <div class="form-group">
      <label>Nom complet</label>
      <div class="input-icon"><i class="fas fa-user"></i><input type="text" id="registerName" placeholder="Jean Dupont"></div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <div class="input-icon"><i class="fas fa-envelope"></i><input type="email" id="registerEmail" placeholder="votre@email.com"></div>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-icon">
        <i class="fas fa-lock"></i>
        <input type="password" id="registerPassword" placeholder="•••••••• (6 caractères minimum)">
        <button class="password-toggle" type="button" onclick="togglePassword('registerPassword')"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <div class="promo-code">🎯 <strong>Essai gratuit</strong> — 15 jours pour découvrir toutes les fonctionnalités</div>
    <button class="btn-auth" onclick="register()"><i class="fas fa-user-plus"></i> S'inscrire</button>
    <div class="auth-switch">Déjà inscrit ? <a href="#" onclick="showLogin()">Se connecter</a></div>
  </div>
</div>
<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    const icon = input.parentElement.querySelector('.password-toggle i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
    else { input.type = 'password'; icon.className = 'fas fa-eye'; }
  }
  function showAlert(message, type='error') {
    const alert = document.getElementById('alertMessage');
    alert.className = 'alert alert-' + type;
    alert.textContent = message;
    alert.style.display = 'block';
    setTimeout(() => { alert.style.display = 'none'; }, 5000);
  }
  function showRegister() { document.getElementById('loginForm').style.display = 'none'; document.getElementById('registerForm').style.display = 'block'; document.getElementById('alertMessage').style.display = 'none'; }
  function showLogin() { document.getElementById('registerForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; document.getElementById('alertMessage').style.display = 'none'; }
  async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    if (!email || !password) return showAlert('Veuillez remplir tous les champs', 'error');
    btn.innerHTML = '<span class="loading-spinner"></span> Connexion...';
    btn.disabled = true;
    try {
      const res = await fetch('/api/auth/login', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ email, password }) });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentShopId', data.user.shopId || '');
        localStorage.setItem('currentShopName', '');
        localStorage.setItem('userRole', data.user.role || 'user');
        showAlert('Connexion réussie !', 'success');
        setTimeout(() => window.location.href = '/', 500);
      } else if (data.error === 'abonnement_expire') {
        showAlert('Votre abonnement a expiré. Contactez l\'administrateur.', 'error');
      } else {
        showAlert(data.error || 'Erreur de connexion', 'error');
      }
    } catch (error) { showAlert('Erreur réseau', 'error'); }
    finally { btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter'; btn.disabled = false; }
  }
  async function register() {
    const fullName = document.getElementById('registerName').value;
    const email = document.getElementById('registerEmail').value;
    const password = document.getElementById('registerPassword').value;
    const btn = document.querySelector('#registerForm .btn-auth');
    if (!fullName || !email || !password) return showAlert('Tous les champs sont requis', 'error');
    if (password.length < 6) return showAlert('Le mot de passe doit faire au moins 6 caractères', 'error');
    btn.innerHTML = '<span class="loading-spinner"></span> Inscription...';
    btn.disabled = true;
    try {
      const res = await fetch('/api/auth/register', { method:'POST', headers:{ 'Content-Type':'application/json' }, body:JSON.stringify({ fullName, email, password }) });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentShopId', '');
        localStorage.setItem('currentShopName', '');
        localStorage.setItem('userRole', data.user.role || 'user');
        showAlert('Inscription réussie ! Bienvenue ' + fullName, 'success');
        setTimeout(() => window.location.href = '/', 500);
      } else { showAlert(data.error || 'Erreur d\'inscription', 'error'); }
    } catch (error) { showAlert('Erreur réseau', 'error'); }
    finally { btn.innerHTML = '<i class="fas fa-user-plus"></i> S\'inscrire'; btn.disabled = false; }
  }
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginForm').style.display !== 'none') login();
      else register();
    }
  });
</script>
</body>
</html>
