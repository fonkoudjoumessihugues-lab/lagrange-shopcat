<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lagrange Shop Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #6D28D9; --primary-dark: #4C1D95; --primary-light: #7C3AED;
      --primary-gradient: linear-gradient(135deg, #4C1D95 0%, #7C3AED 100%);
      --bg-primary: #0A0A0F; --bg-secondary: #14141D;
      --bg-card: rgba(255,255,255,0.05); --bg-card-hover: rgba(255,255,255,0.08);
      --text-primary: #F8FAFC; --text-secondary: #94A3B8; --text-muted: #64748B;
      --border-color: rgba(255,255,255,0.06);
      --shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
      --shadow-glow: 0 0 60px rgba(109,40,217,0.15);
      --radius: 20px; --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; overflow-x: hidden;
    }
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background:var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }

    .sidebar {
      position:fixed; left:0; top:0; height:100vh; width:280px;
      background:rgba(20,20,29,0.95); backdrop-filter:blur(20px);
      border-right:1px solid var(--border-color); z-index:1000;
      overflow-y:auto; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
      box-shadow:4px 0 40px rgba(0,0,0,0.4);
    }
    .sidebar-header { padding:32px 24px 24px; text-align:center; border-bottom:1px solid var(--border-color); }
    .sidebar-header .logo { font-size:56px; display:block; margin-bottom:4px; }
    .sidebar-header h2 { font-size:22px; font-weight:800; background:var(--primary-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .sidebar-header .subtitle { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
    .nav-section { padding:16px 12px; }
    .nav-section-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); padding:0 12px; margin-bottom:8px; font-weight:600; }
    .nav-btn {
      width:100%; text-align:left; background:transparent; border:none;
      color:var(--text-secondary); padding:10px 16px; border-radius:var(--radius-sm);
      cursor:pointer; display:flex; align-items:center; gap:14px;
      font-size:14px; font-weight:500; transition:var(--transition);
      font-family:'Inter',sans-serif;
    }
    .nav-btn:hover { background:var(--bg-card-hover); color:var(--text-primary); transform:translateX(4px); }
    .nav-btn.active { background:rgba(109,40,217,0.2); color:var(--primary-light); box-shadow:inset 3px 0 0 var(--primary); }
    .nav-btn .badge { margin-left:auto; background:var(--primary); color:white; padding:1px 10px; border-radius:20px; font-size:10px; font-weight:700; }
    .nav-btn .badge.danger { background:#EF4444; }

    .main-content { margin-left:280px; min-height:100vh; position:relative; z-index:1; transition:margin-left 0.4s cubic-bezier(0.4,0,0.2,1); }

    .top-bar {
      background:rgba(20,20,29,0.9); backdrop-filter:blur(20px);
      padding:14px 32px; display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:100; gap:16px; flex-wrap:wrap;
    }
    .top-bar-left { display:flex; align-items:center; gap:16px; }
    .menu-toggle { display:none; background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-color); padding:10px 14px; border-radius:var(--radius-sm); cursor:pointer; font-size:18px; }
    .shop-selector { display:flex; align-items:center; gap:12px; background:var(--bg-card); padding:6px 18px 6px 14px; border-radius:30px; border:1px solid var(--border-color); }
    .shop-selector select { border:none; background:transparent; padding:6px 4px; font-weight:600; font-size:14px; font-family:'Inter',sans-serif; color:var(--text-primary); cursor:pointer; outline:none; min-width:120px; }
    .shop-selector select option { background:var(--bg-secondary); color:var(--text-primary); }
    .top-bar-right { display:flex; align-items:center; gap:12px; }
    .shop-info { font-size:13px; color:var(--text-secondary); display:flex; align-items:center; gap:8px; background:var(--bg-card); padding:6px 16px; border-radius:30px; border:1px solid var(--border-color); }
    .shop-info i { color:#10B981; font-size:12px; }
    .user-avatar { width:40px; height:40px; border-radius:50%; background:var(--primary-gradient); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; cursor:pointer; transition:var(--transition); border:2px solid transparent; position:relative; }
    .user-avatar:hover { transform:scale(1.05); border-color:var(--primary-light); }
    .user-avatar .online-dot { position:absolute; bottom:0; right:0; width:12px; height:12px; background:#10B981; border-radius:50%; border:2px solid var(--bg-primary); }

    .content-area { padding:24px 32px 40px; }

    .card {
      background:var(--bg-card); backdrop-filter:blur(10px);
      border-radius:var(--radius); padding:24px; margin-bottom:24px;
      border:1px solid var(--border-color); transition:var(--transition);
      position:relative; overflow:hidden;
    }
    .card:hover { border-color:rgba(124,58,237,0.2); transform:translateY(-2px); box-shadow:var(--shadow-glow); }
    .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .card-header h3 { font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
    .card-header h3 i { color:var(--primary-light); }

    .btn-primary {
      background:var(--primary-gradient); color:white; border:none;
      padding:10px 28px; border-radius:30px; font-weight:600; font-size:14px;
      cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif;
      display:inline-flex; align-items:center; gap:8px;
      box-shadow:0 4px 20px rgba(109,40,217,0.3);
    }
    .btn-primary:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 8px 30px rgba(109,40,217,0.4); }
    .btn-secondary { background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-color); padding:8px 20px; border-radius:30px; font-weight:500; font-size:13px; cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px; }
    .btn-secondary:hover { background:var(--bg-card-hover); border-color:var(--primary-light); }
    .btn-danger { background:linear-gradient(135deg,#DC2626,#EF4444); color:white; border:none; padding:6px 16px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:600; transition:var(--transition); font-family:'Inter',sans-serif; box-shadow:0 4px 15px rgba(239,68,68,0.3); }
    .btn-danger:hover { transform:scale(1.05); }
    .btn-success { background:linear-gradient(135deg,#059669,#10B981); color:white; border:none; padding:6px 16px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:600; transition:var(--transition); font-family:'Inter',sans-serif; box-shadow:0 4px 15px rgba(16,185,129,0.3); }
    .btn-success:hover { transform:scale(1.05); }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card {
      background:var(--bg-card); backdrop-filter:blur(10px);
      border-radius:var(--radius); padding:20px 24px;
      border:1px solid var(--border-color); transition:var(--transition);
      position:relative; overflow:hidden;
    }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--primary-gradient); opacity:0; transition:var(--transition); }
    .stat-card:hover::before { opacity:1; }
    .stat-card:hover { transform:translateY(-4px); border-color:rgba(124,58,237,0.2); box-shadow:var(--shadow-glow); }
    .stat-icon { font-size:28px; opacity:0.15; position:absolute; right:16px; top:16px; color:var(--primary-light); }
    .stat-label { font-size:13px; color:var(--text-secondary); font-weight:500; }
    .stat-value { font-size:28px; font-weight:800; margin-top:4px; letter-spacing:-0.5px; }
    .stat-change { font-size:12px; margin-top:6px; display:inline-flex; align-items:center; gap:4px; padding:2px 12px; border-radius:20px; font-weight:600; }
    .stat-change.positive { color:#10B981; background:rgba(16,185,129,0.15); }
    .stat-change.negative { color:#EF4444; background:rgba(239,68,68,0.15); }

    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-weight:600; margin-bottom:6px; font-size:14px; color:var(--text-secondary); }
    .form-control { width:100%; padding:12px 16px; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:14px; font-family:'Inter',sans-serif; transition:var(--transition); background:rgba(255,255,255,0.03); color:var(--text-primary); }
    .form-control:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,0.06); box-shadow:0 0 0 4px rgba(109,40,217,0.1); }
    .form-control::placeholder { color:var(--text-muted); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:640px) { .form-row { grid-template-columns:1fr; } }

    .table-container { overflow-x:auto; border-radius:var(--radius-sm); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { padding:12px 16px; text-align:left; border-bottom:1px solid var(--border-color); }
    th { background:rgba(255,255,255,0.03); font-weight:600; color:var(--text-secondary); font-size:11px; text-transform:uppercase; letter-spacing:0.8px; }
    tr:hover td { background:rgba(255,255,255,0.02); }

    .toast {
      position:fixed; bottom:24px; right:24px;
      background:rgba(20,20,29,0.95); backdrop-filter:blur(20px);
      color:var(--text-primary); padding:16px 24px; border-radius:var(--radius-sm);
      z-index:9999; animation:slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
      box-shadow:0 10px 40px rgba(0,0,0,0.4); max-width:420px;
      display:flex; align-items:center; gap:12px; border:1px solid var(--border-color);
    }
    .toast.success { border-left:4px solid #10B981; }
    .toast.error { border-left:4px solid #EF4444; }
    .toast.warning { border-left:4px solid #F59E0B; }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }

    .loading-mascot { text-align:center; padding:60px 20px; font-size:48px; }
    .loading-mascot p { margin-top:16px; font-size:16px; color:var(--text-muted); }

    .barcode-scanner { border:2px dashed rgba(124,58,237,0.3); border-radius:var(--radius-sm); padding:24px; text-align:center; cursor:pointer; transition:var(--transition); background:var(--bg-card); }
    .barcode-scanner:hover { border-color:var(--primary); background:var(--bg-card-hover); }
    .barcode-scanner i { font-size:36px; color:var(--primary-light); }
    .barcode-scanner p { margin-top:8px; color:var(--text-secondary); }

    .calculator { background:var(--bg-secondary); border-radius:var(--radius); padding:20px; margin-top:16px; border:1px solid var(--border-color); }
    .calculator-display { background:rgba(255,255,255,0.05); border-radius:var(--radius-sm); padding:16px 20px; text-align:right; font-size:28px; font-weight:700; margin-bottom:16px; color:var(--text-primary); min-height:60px; border:1px solid var(--border-color); }
    .calculator-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .calc-btn { padding:14px; border:none; border-radius:var(--radius-sm); font-size:18px; font-weight:600; cursor:pointer; transition:var(--transition); background:var(--bg-card); color:var(--text-primary); font-family:'Inter',sans-serif; }
    .calc-btn:hover { background:var(--bg-card-hover); transform:scale(1.03); }
    .calc-btn-op { background:var(--primary-gradient); color:white; }
    .calc-btn-op:hover { box-shadow:0 4px 20px rgba(109,40,217,0.3); }

    .memory-game { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; max-width:500px; margin:0 auto; }
    .memory-card { aspect-ratio:1; background:var(--primary-gradient); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:32px; cursor:pointer; transition:var(--transition); color:white; font-weight:700; box-shadow:0 4px 20px rgba(109,40,217,0.2); user-select:none; }
    .memory-card:hover { transform:scale(1.05); }
    .memory-card.flipped { background:var(--bg-card); color:var(--primary-light); border:2px solid var(--primary); }
    .memory-card.matched { visibility:hidden; opacity:0; pointer-events:none; transform:scale(0); }
    .victory-message { text-align:center; padding:24px; font-size:24px; font-weight:700; color:#10B981; animation:victoryAnim 0.6s ease; }
    @keyframes victoryAnim { 0% { transform:scale(0); opacity:0; } 50% { transform:scale(1.2); } 100% { transform:scale(1); opacity:1; } }

    .ai-chat { background:var(--bg-card); border-radius:var(--radius); padding:20px; min-height:400px; max-height:500px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; border:1px solid var(--border-color); }
    .chat-message { display:flex; gap:12px; animation:fadeIn 0.3s ease; }
    .chat-message.user { justify-content:flex-end; }
    .chat-message.bot { justify-content:flex-start; }
    .chat-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .chat-message.user .chat-avatar { background:var(--primary-gradient); color:white; }
    .chat-message.bot .chat-avatar { background:var(--bg-card); color:var(--text-secondary); border:1px solid var(--border-color); }
    .chat-bubble { max-width:75%; padding:12px 18px; border-radius:16px; font-size:14px; line-height:1.6; }
    .chat-message.user .chat-bubble { background:var(--primary-gradient); color:white; border-bottom-right-radius:4px; }
    .chat-message.bot .chat-bubble { background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-color); border-bottom-left-radius:4px; }
    .thinking { display:flex; gap:6px; padding:8px 0; }
    .thinking span { width:10px; height:10px; background:var(--primary-light); border-radius:50%; animation:bounce 1.4s infinite; }
    .thinking span:nth-child(2) { animation-delay:0.2s; }
    .thinking span:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
    .suggestions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .suggestion-btn { background:var(--bg-card); border:1px solid var(--border-color); padding:6px 16px; border-radius:20px; font-size:12px; cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; color:var(--text-secondary); }
    .suggestion-btn:hover { background:var(--primary); color:white; border-color:var(--primary); transform:translateY(-2px); }

    .badge-primary { background:rgba(109,40,217,0.2); color:var(--primary-light); padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-success { background:rgba(16,185,129,0.2); color:#10B981; padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-danger { background:rgba(239,68,68,0.2); color:#EF4444; padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }

    .alert-box { padding:12px 16px; border-radius:var(--radius-sm); margin-bottom:16px; display:none; font-size:14px; }
    .alert-box.info { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); color:#60A5FA; }
    .alert-box.success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#10B981; }
    .alert-box.warning { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); color:#F59E0B; }
    .alert-box.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#EF4444; }

    .subscription-warning { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); border-radius:var(--radius-sm); padding:12px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; color:#F59E0B; font-weight:500; }
    .subscription-expired { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); border-radius:var(--radius-sm); padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; color:#EF4444; font-weight:600; }

    .pagination { display:flex; justify-content:center; gap:8px; margin-top:20px; flex-wrap:wrap; }
    .pagination button { padding:8px 16px; border:1px solid var(--border-color); background:var(--bg-card); color:var(--text-secondary); border-radius:var(--radius-sm); cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; font-size:13px; }
    .pagination button:hover { background:var(--bg-card-hover); color:var(--text-primary); }
    .pagination button.active { background:var(--primary-gradient); color:white; border-color:var(--primary); }

    .autocomplete-container { position:relative; }
    .autocomplete-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-sm); max-height:200px; overflow-y:auto; z-index:50; display:none; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
    .autocomplete-item { padding:10px 16px; cursor:pointer; border-bottom:1px solid var(--border-color); transition:var(--transition); }
    .autocomplete-item:hover { background:var(--bg-card-hover); }

    @media (max-width:1024px) { .stats-grid { grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); } }
    @media (max-width:768px) {
      .sidebar { transform:translateX(-100%); width:100%; max-width:320px; }
      .sidebar.open { transform:translateX(0); }
      .main-content { margin-left:0; }
      .menu-toggle { display:flex; }
      .top-bar { padding:12px 16px; }
      .content-area { padding:16px; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .stat-value { font-size:22px; }
    }
    @media (max-width:480px) { .stats-grid { grid-template-columns:1fr; } .top-bar-right .shop-info { display:none; } .card { padding:16px; } }
    .flex { display:flex; }
    .flex-between { display:flex; justify-content:space-between; align-items:center; }
    .gap-2 { gap:8px; }
    .gap-3 { gap:12px; }
    .gap-4 { gap:16px; }
    .mt-2 { margin-top:8px; }
    .mt-3 { margin-top:16px; }
    .mt-4 { margin-top:24px; }
    .mb-2 { margin-bottom:8px; }
    .mb-3 { margin-bottom:16px; }
    .w-full { width:100%; }
    .text-center { text-align:center; }
    .text-muted { color:var(--text-muted); }
    .text-danger { color:#EF4444; }
    .text-success { color:#10B981; }
    .text-primary { color:var(--primary-light); }
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo">🛒</span>
    <h2>Lagrange</h2>
    <span class="subtitle">Shop Manager Pro</span>
  </div>
  <nav>
    <div class="nav-section">
      <div class="nav-section-title">Menu Principal</div>
      <div class="nav-item"><button class="nav-btn active" onclick="loadDashboard(); closeSidebar()"><i class="fas fa-chart-line"></i> Dashboard</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadShopsList(); closeSidebar()"><i class="fas fa-store"></i> Mes boutiques</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showCreateShop(); closeSidebar()"><i class="fas fa-plus-circle"></i> Nouvelle boutique</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadProducts(); closeSidebar()"><i class="fas fa-box"></i> Produits</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showCreateProduct(); closeSidebar()"><i class="fas fa-tag"></i> Ajouter produit</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showSale(); closeSidebar()"><i class="fas fa-cash-register"></i> Vente</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadSales(); closeSidebar()"><i class="fas fa-receipt"></i> Historique</button></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Gestion</div>
      <div class="nav-item"><button class="nav-btn" onclick="showExpenses(); closeSidebar()"><i class="fas fa-money-bill-wave"></i> Dépenses</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showTransfer(); closeSidebar()"><i class="fas fa-exchange-alt"></i> Transfert stock</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadVendors(); closeSidebar()"><i class="fas fa-users"></i> Vendeurs</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadInvoices(); closeSidebar()"><i class="fas fa-file-invoice"></i> Factures</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showInvoiceConfig(); closeSidebar()"><i class="fas fa-cog"></i> Configuration</button></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Outils</div>

// ============================================================
// API
// ============================================================
async function apiCall(endpoint, options = {}) {
  try {
    const res = await fetch(endpoint, {
      ...options,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...options.headers }
    });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/auth.html'; return null; }
    if (res.status === 403) {
      const data = await res.json();
      if (data.error === 'abonnement_expire') { showSubscriptionExpired(); return null; }
      showToast(data.error || 'Accès refusé', 'error'); return null;
    }
    return res.json();
  } catch (error) { showToast('Erreur de connexion', 'error'); return null; }
}

function showToast(msg, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function showSubscriptionExpired() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:600px;margin:40px auto;text-align:center;padding:40px;">
      <div style="font-size:64px;margin-bottom:20px;">🚫</div>
      <h2 style="color:#EF4444;font-size:28px;font-weight:800;">Abonnement expiré</h2>
      <p style="color:var(--text-secondary);margin:16px 0 24px;font-size:16px;line-height:1.6;">
        Votre période d'essai de 15 jours est terminée.<br>
        Pour continuer à utiliser Lagrange Shop Manager, veuillez renouveler votre abonnement.
      </p>
      <button class="btn-primary" onclick="renewSubscription()" style="font-size:16px;padding:12px 40px;margin-bottom:12px;">
        <i class="fab fa-whatsapp"></i> Renouveler via WhatsApp
      </button>
      <br>
      <button class="btn-secondary" onclick="logout()" style="font-size:14px;padding:10px 30px;">Se déconnecter</button>
    </div>
  `;
}

async function renewSubscription() {
  try {
    const res = await fetch('/api/subscription/renew', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    if (data.url) { window.open(data.url, '_blank'); showToast('Redirection vers WhatsApp...'); }
  } catch (error) { showToast('Erreur de redirection', 'error'); }
}

// ============================================================
// NOTIFICATION 15 SECONDES
// ============================================================
function showTempPassword(password) {
  const container = document.createElement('div');
  container.style.cssText = `
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:rgba(20,20,29,0.95); backdrop-filter:blur(20px);
    color:#10B981; padding:20px 32px; border-radius:16px;
    border:1px solid rgba(16,185,129,0.3); z-index:9999;
    text-align:center; font-size:18px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation:slideUp 0.4s ease; max-width:90%;
  `;
  container.innerHTML = `
    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:8px;">🔑 Mot de passe temporaire</div>
    <div style="font-size:28px;font-weight:800;letter-spacing:4px;font-family:monospace;">${password}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">⏱ Ce mot de passe disparaîtra dans <span id="countdownTimer">15</span> secondes</div>
    <button onclick="copyPassword('${password}')" style="margin-top:12px;background:var(--primary-gradient);color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:600;">📋 Copier</button>
  `;
  document.body.appendChild(container);
  let seconds = 15;
  const timer = setInterval(() => {
    seconds--;
    const el = document.getElementById('countdownTimer');
    if (el) el.textContent = seconds;
    if (seconds <= 0) { clearInterval(timer); container.style.opacity='0'; container.style.transition='opacity 0.5s'; setTimeout(()=>container.remove(),500); }
  }, 1000);
}
function copyPassword(password) {
  navigator.clipboard?.writeText(password).then(() => showToast('✅ Mot de passe copié !'))
    .catch(() => { const input = document.createElement('input'); input.value = password; document.body.appendChild(input); input.select(); document.execCommand('copy'); document.body.removeChild(input); showToast('✅ Mot de passe copié !'); });
}

// SHOPS
// ============================================================
async function loadShops() {
  const shops = await apiCall('/api/shops');
  if (!shops) return;
  const select = document.getElementById('shopSelect');
  select.innerHTML = '<option value="">-- Sélectionner --</option>';
  shops.forEach(s => { select.innerHTML += `<option value="${s.id}" ${currentShopId == s.id ? 'selected' : ''}>${s.name}</option>`; });
  if (!currentShopId && shops.length > 0) {
    currentShopId = shops[0].id; currentShopName = shops[0].name;
    localStorage.setItem('currentShopId', currentShopId); localStorage.setItem('currentShopName', currentShopName);
    document.getElementById('shopNameDisplay').textContent = currentShopName;
    loadDashboard();
  } else if (currentShopId) {
    const shop = shops.find(s => s.id === currentShopId);
    if (shop) { currentShopName = shop.name; document.getElementById('shopNameDisplay').textContent = currentShopName; }
  }
  return shops;
}
function changeShop() {
  const select = document.getElementById('shopSelect');
  currentShopId = parseInt(select.value);
  currentShopName = select.options[select.selectedIndex]?.text || '';
  localStorage.setItem('currentShopId', currentShopId); localStorage.setItem('currentShopName', currentShopName);
  document.getElementById('shopNameDisplay').textContent = currentShopName;
  showToast('Boutique ' + currentShopName + ' sélectionnée');
  loadDashboard();
}

async function loadDashboard() {
  if (!currentShopId) {
    await loadShops();
    if (!currentShopId) {
      document.getElementById('content').innerHTML = `
        <div class="card" style="text-align:center;padding:60px 20px;">

          <button class="btn-primary" onclick="showCreateShop()"><i class="fas fa-plus"></i> Créer une boutique</button>
        </div>
      `;
      return;
    }
  }
  const stats = await apiCall(`/api/dashboard/stats?shopId=${currentShopId}`);
  if (!stats) return;
  let evolutionClass = stats.salesEvolution >= 0 ? 'positive' : 'negative';
  let evolutionSign = stats.salesEvolution >= 0 ? '+' : '';
  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-label">Ventes aujourd'hui</div><div class="stat-value">${stats.dailySales}</div><div class="stat-change ${evolutionClass}">${evolutionSign}${stats.salesEvolution.toFixed(1)}% vs hier</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-day"></i></div><div class="stat-label">Ventes hier</div><div class="stat-value">${stats.yesterdaySales}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-week"></i></div><div class="stat-label">Ventes (7j)</div><div class="stat-value">${stats.weeklySales}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div><div class="stat-label">Ventes totales</div><div class="stat-value">${stats.monthlySales}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-label">Chiffre d'affaires</div><div class="stat-value">${(stats.revenue || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-credit-card"></i></div><div class="stat-label">Dépenses</div><div class="stat-value">${(stats.totalExpenses || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-pie"></i></div><div class="stat-label">Bénéfice net</div><div class="stat-value">${(stats.netProfit || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-label">Stock faible</div><div class="stat-value">${stats.lowStockCount}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-times-circle"></i></div><div class="stat-label">Ruptures</div><div class="stat-value">${stats.outOfStockCount}</div></div>
    </div>
    <!-- NOUVELLES STATS -->
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-bag"></i></div><div class="stat-label">Panier moyen</div><div class="stat-value">${(stats.averageCart || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-percent"></i></div><div class="stat-label">Taux de conversion</div><div class="stat-value">${(stats.conversionRate || 0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-trophy"></i></div><div class="stat-label">Produit le plus rentable</div><div class="stat-value" style="font-size:18px;">${stats.topProfitProducts?.[0]?.name || '—'}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar"></i></div><div class="stat-label">Saisonnalité</div><div class="stat-value" style="font-size:18px;">${Object.keys(stats.seasonality || {}).length} mois actifs</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-bullseye"></i></div><div class="stat-label">Objectif mensuel</div><div class="stat-value">${(stats.monthlyTarget || 0).toLocaleString()} ${currency}</div></div>
    </div>
  `;
  if (stats.dailyChart) {
    html += `<div class="card"><div class="card-header"><h3><i class="fas fa-chart-line"></i> Évolution des ventes</h3></div><canvas id="salesChart"></canvas></div>`;
  }
  if (stats.topProducts?.length) {
    html += `<div class="card"><div class="card-header"><h3><i class="fas fa-trophy"></i> Top produits</h3></div><canvas id="topChart"></canvas></div>`;
  }
  if (stats.topSellers?.length) {
    html += `<div class="card"><div class="card-header"><h3><i class="fas fa-crown"></i> Meilleurs vendeurs</h3></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">${stats.topSellers.map(s => `<div style="background:var(--bg-card);padding:12px 16px;border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border-color);"><span style="font-weight:600;">${s.name}</span><span style="color:var(--primary-light);font-weight:700;">${s.revenue.toLocaleString()} ${currency}</span></div>`).join('')}</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
  if (stats.dailyChart && document.getElementById('salesChart')) {
    if (charts.salesChart) charts.salesChart.destroy();
    charts.salesChart = new Chart(document.getElementById('salesChart'), {
      type:'line',
      data:{ labels:stats.dailyChart.map(d=>d.date), datasets:[{ label:'Ventes', data:stats.dailyChart.map(d=>d.count), borderColor:'#7C3AED', backgroundColor:'rgba(124,58,237,0.1)', tension:0.3, fill:true, pointBackgroundColor:'#7C3AED', pointBorderColor:'#fff', pointBorderWidth:2, pointRadius:4 }] },
      options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, grid:{ color:'rgba(255,255,255,0.05)' } }, x:{ grid:{ display:false } } } }
    });
  }
  if (stats.topProducts && document.getElementById('topChart')) {
    if (charts.topChart) charts.topChart.destroy();
    charts.topChart = new Chart(document.getElementById('topChart'), {
      type:'bar',
      data:{ labels:stats.topProducts.map(p=>p.name), datasets:[{ label:'Quantités vendues', data:stats.topProducts.map(p=>p.quantitySold), backgroundColor:'#7C3AED', borderRadius:8, barThickness:40 }] },
      options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, grid:{ color:'rgba(255,255,255,0.05)' } }, x:{ grid:{ display:false } } } }
    });
  }
}

async function loadVendors() {
  if (!currentShopId) return showToast('Sélectionnez une boutique', 'error');
  const vendors = await apiCall(`/api/vendors?shopId=${currentShopId}`);
  if (!vendors) return;
  let html = `<div class="card"><div class="card-header"><h3><i class="fas fa-users"></i> Vendeurs</h3><button class="btn-primary" onclick="showInviteVendor()"><i class="fas fa-user-plus"></i> Inviter</button></div><div class="table-container"><table><thead><tr><th>Nom</th><th>Email</th><th>Tél</th><th>CNI</th><th>Commission</th><th></th></tr></thead><tbody>`;
  vendors.forEach(v => {
    html += `<tr><td><strong>${v.fullName}</strong></td><td>${v.email}</td><td>${v.phone || '-'}</td><td>${v.cni || '-'}</td><td>${v.commission}%</td><td><button class="btn-danger" onclick="deleteVendor(${v.id})" style="padding:4px 12px;font-size:12px;"><i class="fas fa-trash"></i></button></td></tr>`;
  });
  if (vendors.length === 0) html += `<tr><td colspan="6" class="text-center" style="padding:24px;color:var(--text-muted);">Aucun vendeur</td></tr>`;
  html += `</tbody></table></div></div>`;
  document.getElementById('content').innerHTML = html;
}
function showInviteVendor() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:600px;margin:0 auto;">
      <div class="card-header"><h3><i class="fas fa-user-plus"></i> Inviter un vendeur</h3></div>
      <div class="form-row"><div class="form-group"><label>Nom complet *</label><input id="vendorName" class="form-control" placeholder="Jean Dupont"></div><div class="form-group"><label>Email *</label><input id="vendorEmail" class="form-control" placeholder="vendeur@email.com"></div></div>
      <div class="form-row"><div class="form-group"><label>Téléphone</label><input id="vendorPhone" class="form-control" placeholder="Téléphone"></div><div class="form-group"><label>CNI</label><input id="vendorCni" class="form-control" placeholder="CNI"></div></div>
      <div class="form-group"><label>Adresse</label><textarea id="vendorAddress" class="form-control" rows="2" placeholder="Adresse"></textarea></div>
      <div class="form-group"><label>Commission (%)</label><input id="vendorCommission" type="number" class="form-control" placeholder="0"></div>
      <button class="btn-primary w-full" onclick="inviteVendor()"><i class="fas fa-paper-plane"></i> Inviter</button>
    </div>
  `;
}
async function inviteVendor() {
  const fullName = document.getElementById('vendorName').value;
  const email = document.getElementById('vendorEmail').value;
  const phone = document.getElementById('vendorPhone').value;
  const cni = document.getElementById('vendorCni').value;
  const address = document.getElementById('vendorAddress').value;
  const commission = parseInt(document.getElementById('vendorCommission').value) || 0;
  if (!fullName || !email) return showToast('Nom et email requis', 'error');
  const res = await fetch('/api/vendors', { method:'POST', headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+token }, body:JSON.stringify({ email, fullName, phone, cni, address, commission, shopId:currentShopId }) });
  const data = await res.json();
  if (res.ok) {
    showToast(data.message);
    if (data.tempPassword) showTempPassword(data.tempPassword);
    loadVendors();
  } else { showToast(data.error, 'error'); }
}
async function deleteVendor(id) {
  if (confirm('Supprimer ce vendeur ?')) {
    await fetch(`/api/vendors/${id}`, { method:'DELETE', headers:{ 'Authorization':'Bearer '+token } });
    showToast('Vendeur supprimé');
    loadVendors();
  }
}
