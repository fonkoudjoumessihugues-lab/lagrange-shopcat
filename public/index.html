<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lagrange Shop Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --primary: #6D28D9; --primary-dark: #4C1D95; --primary-light: #7C3AED;
      --primary-gradient: linear-gradient(135deg, #4C1D95 0%, #7C3AED 100%);
      --bg-primary: #0A0A0F; --bg-secondary: #14141D;
      --bg-card: rgba(255,255,255,0.05); --bg-card-hover: rgba(255,255,255,0.08);
      --text-primary: #F8FAFC; --text-secondary: #94A3B8; --text-muted: #64748B;
      --border-color: rgba(255,255,255,0.06);
      --shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
      --shadow-glow: 0 0 60px rgba(109,40,217,0.15);
      --radius: 20px; --radius-sm: 12px;
      --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary); color: var(--text-primary);
      min-height: 100vh; overflow-x: hidden;
    }
    ::-webkit-scrollbar { width:8px; }
    ::-webkit-scrollbar-track { background:var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }

    .sidebar {
      position:fixed; left:0; top:0; height:100vh; width:280px;
      background:rgba(20,20,29,0.95); backdrop-filter:blur(20px);
      border-right:1px solid var(--border-color); z-index:1000;
      overflow-y:auto; transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
      box-shadow:4px 0 40px rgba(0,0,0,0.4);
    }
    .sidebar-header { padding:32px 24px 24px; text-align:center; border-bottom:1px solid var(--border-color); }
    .sidebar-header .logo { font-size:56px; display:block; margin-bottom:4px; }
    .sidebar-header h2 { font-size:22px; font-weight:800; background:var(--primary-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .sidebar-header .subtitle { font-size:11px; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; }
    .nav-section { padding:16px 12px; }
    .nav-section-title { font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); padding:0 12px; margin-bottom:8px; font-weight:600; }
    .nav-btn {
      width:100%; text-align:left; background:transparent; border:none;
      color:var(--text-secondary); padding:10px 16px; border-radius:var(--radius-sm);
      cursor:pointer; display:flex; align-items:center; gap:14px;
      font-size:14px; font-weight:500; transition:var(--transition);
      font-family:'Inter',sans-serif;
    }
    .nav-btn:hover { background:var(--bg-card-hover); color:var(--text-primary); transform:translateX(4px); }
    .nav-btn.active { background:rgba(109,40,217,0.2); color:var(--primary-light); box-shadow:inset 3px 0 0 var(--primary); }
    .nav-btn .badge { margin-left:auto; background:var(--primary); color:white; padding:1px 10px; border-radius:20px; font-size:10px; font-weight:700; }
    .nav-btn .badge.danger { background:#EF4444; }

    .main-content { margin-left:280px; min-height:100vh; position:relative; z-index:1; transition:margin-left 0.4s cubic-bezier(0.4,0,0.2,1); }

    .top-bar {
      background:rgba(20,20,29,0.9); backdrop-filter:blur(20px);
      padding:14px 32px; display:flex; justify-content:space-between; align-items:center;
      border-bottom:1px solid var(--border-color); position:sticky; top:0; z-index:100; gap:16px; flex-wrap:wrap;
    }
    .top-bar-left { display:flex; align-items:center; gap:16px; }
    .menu-toggle { display:none; background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-color); padding:10px 14px; border-radius:var(--radius-sm); cursor:pointer; font-size:18px; }
    .shop-selector { display:flex; align-items:center; gap:12px; background:var(--bg-card); padding:6px 18px 6px 14px; border-radius:30px; border:1px solid var(--border-color); }
    .shop-selector select { border:none; background:transparent; padding:6px 4px; font-weight:600; font-size:14px; font-family:'Inter',sans-serif; color:var(--text-primary); cursor:pointer; outline:none; min-width:120px; }
    .shop-selector select option { background:var(--bg-secondary); color:var(--text-primary); }
    .top-bar-right { display:flex; align-items:center; gap:12px; }
    .shop-info { font-size:13px; color:var(--text-secondary); display:flex; align-items:center; gap:8px; background:var(--bg-card); padding:6px 16px; border-radius:30px; border:1px solid var(--border-color); }
    .shop-info i { color:#10B981; font-size:12px; }
    .user-avatar { width:40px; height:40px; border-radius:50%; background:var(--primary-gradient); color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; cursor:pointer; transition:var(--transition); border:2px solid transparent; position:relative; }
    .user-avatar:hover { transform:scale(1.05); border-color:var(--primary-light); }
    .user-avatar .online-dot { position:absolute; bottom:0; right:0; width:12px; height:12px; background:#10B981; border-radius:50%; border:2px solid var(--bg-primary); }

    .content-area { padding:24px 32px 40px; }

    .card {
      background:var(--bg-card); backdrop-filter:blur(10px);
      border-radius:var(--radius); padding:24px; margin-bottom:24px;
      border:1px solid var(--border-color); transition:var(--transition);
      position:relative; overflow:hidden;
    }
    .card:hover { border-color:rgba(124,58,237,0.2); transform:translateY(-2px); box-shadow:var(--shadow-glow); }
    .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .card-header h3 { font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
    .card-header h3 i { color:var(--primary-light); }

    .btn-primary {
      background:var(--primary-gradient); color:white; border:none;
      padding:10px 28px; border-radius:30px; font-weight:600; font-size:14px;
      cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif;
      display:inline-flex; align-items:center; gap:8px;
      box-shadow:0 4px 20px rgba(109,40,217,0.3);
    }
    .btn-primary:hover { transform:translateY(-2px) scale(1.02); box-shadow:0 8px 30px rgba(109,40,217,0.4); }
    .btn-secondary { background:var(--bg-card); color:var(--text-primary); border:1px solid var(--border-color); padding:8px 20px; border-radius:30px; font-weight:500; font-size:13px; cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px; }
    .btn-secondary:hover { background:var(--bg-card-hover); border-color:var(--primary-light); }
    .btn-danger { background:linear-gradient(135deg,#DC2626,#EF4444); color:white; border:none; padding:6px 16px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:600; transition:var(--transition); font-family:'Inter',sans-serif; box-shadow:0 4px 15px rgba(239,68,68,0.3); }
    .btn-danger:hover { transform:scale(1.05); }
    .btn-success { background:linear-gradient(135deg,#059669,#10B981); color:white; border:none; padding:6px 16px; border-radius:20px; cursor:pointer; font-size:13px; font-weight:600; transition:var(--transition); font-family:'Inter',sans-serif; box-shadow:0 4px 15px rgba(16,185,129,0.3); }
    .btn-success:hover { transform:scale(1.05); }

    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
    .stat-card {
      background:var(--bg-card); backdrop-filter:blur(10px);
      border-radius:var(--radius); padding:20px 24px;
      border:1px solid var(--border-color); transition:var(--transition);
      position:relative; overflow:hidden;
    }
    .stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--primary-gradient); opacity:0; transition:var(--transition); }
    .stat-card:hover::before { opacity:1; }
    .stat-card:hover { transform:translateY(-4px); border-color:rgba(124,58,237,0.2); box-shadow:var(--shadow-glow); }
    .stat-icon { font-size:28px; opacity:0.15; position:absolute; right:16px; top:16px; color:var(--primary-light); }
    .stat-label { font-size:13px; color:var(--text-secondary); font-weight:500; }
    .stat-value { font-size:28px; font-weight:800; margin-top:4px; letter-spacing:-0.5px; }
    .stat-change { font-size:12px; margin-top:6px; display:inline-flex; align-items:center; gap:4px; padding:2px 12px; border-radius:20px; font-weight:600; }
    .stat-change.positive { color:#10B981; background:rgba(16,185,129,0.15); }
    .stat-change.negative { color:#EF4444; background:rgba(239,68,68,0.15); }

    .form-group { margin-bottom:18px; }
    .form-group label { display:block; font-weight:600; margin-bottom:6px; font-size:14px; color:var(--text-secondary); }
    .form-control { width:100%; padding:12px 16px; border:1px solid var(--border-color); border-radius:var(--radius-sm); font-size:14px; font-family:'Inter',sans-serif; transition:var(--transition); background:rgba(255,255,255,0.03); color:var(--text-primary); }
    .form-control:focus { outline:none; border-color:var(--primary); background:rgba(255,255,255,0.06); box-shadow:0 0 0 4px rgba(109,40,217,0.1); }
    .form-control::placeholder { color:var(--text-muted); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    @media (max-width:640px) { .form-row { grid-template-columns:1fr; } }

    .table-container { overflow-x:auto; border-radius:var(--radius-sm); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    th, td { padding:12px 16px; text-align:left; border-bottom:1px solid var(--border-color); }
    th { background:rgba(255,255,255,0.03); font-weight:600; color:var(--text-secondary); font-size:11px; text-transform:uppercase; letter-spacing:0.8px; }
    tr:hover td { background:rgba(255,255,255,0.02); }

    .toast {
      position:fixed; bottom:24px; right:24px;
      background:rgba(20,20,29,0.95); backdrop-filter:blur(20px);
      color:var(--text-primary); padding:16px 24px; border-radius:var(--radius-sm);
      z-index:9999; animation:slideUp 0.4s cubic-bezier(0.4,0,0.2,1);
      box-shadow:0 10px 40px rgba(0,0,0,0.4); max-width:420px;
      display:flex; align-items:center; gap:12px; border:1px solid var(--border-color);
    }
    .toast.success { border-left:4px solid #10B981; }
    .toast.error { border-left:4px solid #EF4444; }
    .toast.warning { border-left:4px solid #F59E0B; }
    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }

    .loading-mascot { text-align:center; padding:60px 20px; font-size:48px; }
    .loading-mascot p { margin-top:16px; font-size:16px; color:var(--text-muted); }

    .barcode-scanner { border:2px dashed rgba(124,58,237,0.3); border-radius:var(--radius-sm); padding:24px; text-align:center; cursor:pointer; transition:var(--transition); background:var(--bg-card); }
    .barcode-scanner:hover { border-color:var(--primary); background:var(--bg-card-hover); }
    .barcode-scanner i { font-size:36px; color:var(--primary-light); }
    .barcode-scanner p { margin-top:8px; color:var(--text-secondary); }

    .calculator { background:var(--bg-secondary); border-radius:var(--radius); padding:20px; margin-top:16px; border:1px solid var(--border-color); }
    .calculator-display { background:rgba(255,255,255,0.05); border-radius:var(--radius-sm); padding:16px 20px; text-align:right; font-size:28px; font-weight:700; margin-bottom:16px; color:var(--text-primary); min-height:60px; border:1px solid var(--border-color); }
    .calculator-buttons { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .calc-btn { padding:14px; border:none; border-radius:var(--radius-sm); font-size:18px; font-weight:600; cursor:pointer; transition:var(--transition); background:var(--bg-card); color:var(--text-primary); font-family:'Inter',sans-serif; }
    .calc-btn:hover { background:var(--bg-card-hover); transform:scale(1.03); }
    .calc-btn-op { background:var(--primary-gradient); color:white; }
    .calc-btn-op:hover { box-shadow:0 4px 20px rgba(109,40,217,0.3); }

    .memory-game { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; max-width:500px; margin:0 auto; }
    .memory-card { aspect-ratio:1; background:var(--primary-gradient); border-radius:var(--radius-sm); display:flex; align-items:center; justify-content:center; font-size:32px; cursor:pointer; transition:var(--transition); color:white; font-weight:700; box-shadow:0 4px 20px rgba(109,40,217,0.2); user-select:none; }
    .memory-card:hover { transform:scale(1.05); }
    .memory-card.flipped { background:var(--bg-card); color:var(--primary-light); border:2px solid var(--primary); }
    .memory-card.matched { visibility:hidden; opacity:0; pointer-events:none; transform:scale(0); }
    .victory-message { text-align:center; padding:24px; font-size:24px; font-weight:700; color:#10B981; animation:victoryAnim 0.6s ease; }
    @keyframes victoryAnim { 0% { transform:scale(0); opacity:0; } 50% { transform:scale(1.2); } 100% { transform:scale(1); opacity:1; } }

    .ai-chat { background:var(--bg-card); border-radius:var(--radius); padding:20px; min-height:400px; max-height:500px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; border:1px solid var(--border-color); }
    .chat-message { display:flex; gap:12px; animation:fadeIn 0.3s ease; }
    .chat-message.user { justify-content:flex-end; }
    .chat-message.bot { justify-content:flex-start; }
    .chat-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .chat-message.user .chat-avatar { background:var(--primary-gradient); color:white; }
    .chat-message.bot .chat-avatar { background:var(--bg-card); color:var(--text-secondary); border:1px solid var(--border-color); }
    .chat-bubble { max-width:75%; padding:12px 18px; border-radius:16px; font-size:14px; line-height:1.6; }
    .chat-message.user .chat-bubble { background:var(--primary-gradient); color:white; border-bottom-right-radius:4px; }
    .chat-message.bot .chat-bubble { background:var(--bg-secondary); color:var(--text-primary); border:1px solid var(--border-color); border-bottom-left-radius:4px; }
    .thinking { display:flex; gap:6px; padding:8px 0; }
    .thinking span { width:10px; height:10px; background:var(--primary-light); border-radius:50%; animation:bounce 1.4s infinite; }
    .thinking span:nth-child(2) { animation-delay:0.2s; }
    .thinking span:nth-child(3) { animation-delay:0.4s; }
    @keyframes bounce { 0%,80%,100% { transform:scale(0); } 40% { transform:scale(1); } }
    .suggestions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .suggestion-btn { background:var(--bg-card); border:1px solid var(--border-color); padding:6px 16px; border-radius:20px; font-size:12px; cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; color:var(--text-secondary); }
    .suggestion-btn:hover { background:var(--primary); color:white; border-color:var(--primary); transform:translateY(-2px); }

    .badge-primary { background:rgba(109,40,217,0.2); color:var(--primary-light); padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-success { background:rgba(16,185,129,0.2); color:#10B981; padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }
    .badge-danger { background:rgba(239,68,68,0.2); color:#EF4444; padding:2px 12px; border-radius:20px; font-size:11px; font-weight:600; }

    .alert-box { padding:12px 16px; border-radius:var(--radius-sm); margin-bottom:16px; display:none; font-size:14px; }
    .alert-box.info { background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); color:#60A5FA; }
    .alert-box.success { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2); color:#10B981; }
    .alert-box.warning { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); color:#F59E0B; }
    .alert-box.error { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); color:#EF4444; }

    .subscription-warning { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); border-radius:var(--radius-sm); padding:12px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; color:#F59E0B; font-weight:500; }
    .subscription-expired { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); border-radius:var(--radius-sm); padding:16px 20px; margin-bottom:16px; display:flex; align-items:center; gap:12px; color:#EF4444; font-weight:600; }

    .pagination { display:flex; justify-content:center; gap:8px; margin-top:20px; flex-wrap:wrap; }
    .pagination button { padding:8px 16px; border:1px solid var(--border-color); background:var(--bg-card); color:var(--text-secondary); border-radius:var(--radius-sm); cursor:pointer; transition:var(--transition); font-family:'Inter',sans-serif; font-size:13px; }
    .pagination button:hover { background:var(--bg-card-hover); color:var(--text-primary); }
    .pagination button.active { background:var(--primary-gradient); color:white; border-color:var(--primary); }

    .autocomplete-container { position:relative; }
    .autocomplete-dropdown { position:absolute; top:100%; left:0; right:0; background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:var(--radius-sm); max-height:200px; overflow-y:auto; z-index:50; display:none; box-shadow:0 10px 40px rgba(0,0,0,0.3); }
    .autocomplete-item { padding:10px 16px; cursor:pointer; border-bottom:1px solid var(--border-color); transition:var(--transition); }
    .autocomplete-item:hover { background:var(--bg-card-hover); }

    @media (max-width:1024px) { .stats-grid { grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); } }
    @media (max-width:768px) {
      .sidebar { transform:translateX(-100%); width:100%; max-width:320px; }
      .sidebar.open { transform:translateX(0); }
      .main-content { margin-left:0; }
      .menu-toggle { display:flex; }
      .top-bar { padding:12px 16px; }
      .content-area { padding:16px; }
      .stats-grid { grid-template-columns:1fr 1fr; }
      .stat-value { font-size:22px; }
    }
    @media (max-width:480px) { .stats-grid { grid-template-columns:1fr; } .top-bar-right .shop-info { display:none; } .card { padding:16px; } }
    .flex { display:flex; }
    .flex-between { display:flex; justify-content:space-between; align-items:center; }
    .gap-2 { gap:8px; }
    .gap-3 { gap:12px; }
    .gap-4 { gap:16px; }
    .mt-2 { margin-top:8px; }
    .mt-3 { margin-top:16px; }
    .mt-4 { margin-top:24px; }
    .mb-2 { margin-bottom:8px; }
    .mb-3 { margin-bottom:16px; }
    .w-full { width:100%; }
    .text-center { text-align:center; }
    .text-muted { color:var(--text-muted); }
    .text-danger { color:#EF4444; }
    .text-success { color:#10B981; }
    .text-primary { color:var(--primary-light); }
  </style>
</head>
<body>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo">🛒</span>
    <h2>Lagrange</h2>
    <span class="subtitle">Shop Manager Pro</span>
  </div>
  <nav>
    <div class="nav-section">
      <div class="nav-section-title">Menu Principal</div>
      <div class="nav-item"><button class="nav-btn active" onclick="loadDashboard(); closeSidebar()"><i class="fas fa-chart-line"></i> Dashboard</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadShopsList(); closeSidebar()"><i class="fas fa-store"></i> Mes boutiques</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showCreateShop(); closeSidebar()"><i class="fas fa-plus-circle"></i> Nouvelle boutique</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadProducts(); closeSidebar()"><i class="fas fa-box"></i> Produits</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showCreateProduct(); closeSidebar()"><i class="fas fa-tag"></i> Ajouter produit</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showSale(); closeSidebar()"><i class="fas fa-cash-register"></i> Vente</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadSales(); closeSidebar()"><i class="fas fa-receipt"></i> Historique</button></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Gestion</div>
      <div class="nav-item"><button class="nav-btn" onclick="showExpenses(); closeSidebar()"><i class="fas fa-money-bill-wave"></i> Dépenses</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showTransfer(); closeSidebar()"><i class="fas fa-exchange-alt"></i> Transfert stock</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadVendors(); closeSidebar()"><i class="fas fa-users"></i> Vendeurs</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="loadInvoices(); closeSidebar()"><i class="fas fa-file-invoice"></i> Factures</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showInvoiceConfig(); closeSidebar()"><i class="fas fa-cog"></i> Configuration</button></div>
    </div>
    <div class="nav-section">
      <div class="nav-section-title">Outils</div>
      <div class="nav-item"><button class="nav-btn" onclick="showExport(); closeSidebar()"><i class="fas fa-download"></i> Export</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showCalculatorPage(); closeSidebar()"><i class="fas fa-calculator"></i> Calculatrice</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showMiniGame(); closeSidebar()"><i class="fas fa-gamepad"></i> Mini-jeu</button></div>
      <div class="nav-item"><button class="nav-btn" onclick="showAI(); closeSidebar()"><i class="fas fa-microchip"></i> Assistant IA <span class="badge">IA</span></button></div>
    </div>
    <div class="nav-section" style="border-top:1px solid var(--border-color); padding-top:12px; margin-top:4px;">
      <div class="nav-item"><button class="nav-btn" onclick="loadAdminDashboard(); closeSidebar()" id="adminMenuBtn" style="display:none;"><i class="fas fa-shield-alt"></i> Administration <span class="badge danger" id="adminNotifBadge">0</span></button></div>
      <div class="nav-item"><button class="nav-btn" onclick="logout(); closeSidebar()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></div>

</div>

<div class="main-content">
  <header class="top-bar">
    <div class="top-bar-left">
      <button class="menu-toggle" id="menuToggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
      <div class="shop-selector"><i class="fas fa-store"></i><select id="shopSelect" onchange="changeShop()"><option value="">-- Sélectionner --</option></select></div>
    </div>
    <div class="top-bar-right">
      <div class="shop-info"><i class="fas fa-check-circle"></i> <span id="shopNameDisplay">Aucune boutique</span></div>
      <div class="user-avatar" id="userAvatar"><span id="avatarLetter">👤</span><span class="online-dot"></span></div>
    </div>
  </header>
  <main class="content-area" id="content"><div class="loading-mascot">🛒<p>Chargement de votre espace...</p></div></main>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
let token = localStorage.getItem('token');
let currentShopId = localStorage.getItem('currentShopId') ? parseInt(localStorage.getItem('currentShopId')) : null;
let currentShopName = localStorage.getItem('currentShopName') || '';
let charts = {};
let currency = localStorage.getItem('currency') || 'FCFA';
let productsCache = [];
let userRole = localStorage.getItem('userRole') || 'user';
let currentPage = 1;
const ITEMS_PER_PAGE = 50;
let productPhotoBase64 = null;
let tempPhotoBase64 = null;
let saleCalculatorVisible = false;
let saleCalcValue = '', saleCalcOperator = '', saleCalcPrevious = '';
let calcValue = '', calcOperator = '', calcPrevious = '';
let gameCards = [], gameFlipped = [], gameMatched = [];
let gameVictory = false;
let chatHistory = [];
let orderProducts = [];
let orderTotal = 0;

if (!token) { window.location.href = '/auth.html'; }
if (userRole === 'super_admin' || userRole === 'admin') {
  document.getElementById('adminMenuBtn').style.display = 'flex';
}

function closeSidebar() { if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open'); }

// ============================================================
// API
// ============================================================
async function apiCall(endpoint, options = {}) {
  try {
    const res = await fetch(endpoint, {
      ...options,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...options.headers }
    });
    if (res.status === 401) { localStorage.clear(); window.location.href = '/auth.html'; return null; }
    if (res.status === 403) {
      const data = await res.json();
      if (data.error === 'abonnement_expire') { showSubscriptionExpired(); return null; }
      showToast(data.error || 'Accès refusé', 'error'); return null;
    }
    return res.json();
  } catch (error) { showToast('Erreur de connexion', 'error'); return null; }
}

function showToast(msg, type = 'success') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3500);
}

function showSubscriptionExpired() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:600px;margin:40px auto;text-align:center;padding:40px;">
      <div style="font-size:64px;margin-bottom:20px;">🚫</div>
      <h2 style="color:#EF4444;font-size:28px;font-weight:800;">Abonnement expiré</h2>
      <p style="color:var(--text-secondary);margin:16px 0 24px;font-size:16px;line-height:1.6;">
        Votre période d'essai de 15 jours est terminée.<br>
        Pour continuer à utiliser Lagrange Shop Manager, veuillez renouveler votre abonnement.
      </p>
      <button class="btn-primary" onclick="renewSubscription()" style="font-size:16px;padding:12px 40px;margin-bottom:12px;">
        <i class="fab fa-whatsapp"></i> Renouveler via WhatsApp
      </button>
      <br>
      <button class="btn-secondary" onclick="logout()" style="font-size:14px;padding:10px 30px;">Se déconnecter</button>
    </div>
  `;
}

async function renewSubscription() {
  try {
    const res = await fetch('/api/subscription/renew', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await res.json();
    if (data.url) { window.open(data.url, '_blank'); showToast('Redirection vers WhatsApp...'); }
  } catch (error) { showToast('Erreur de redirection', 'error'); }
}

// ============================================================
// NOTIFICATION 15 SECONDES
// ============================================================
function showTempPassword(password) {
  const container = document.createElement('div');
  container.style.cssText = `
    position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
    background:rgba(20,20,29,0.95); backdrop-filter:blur(20px);
    color:#10B981; padding:20px 32px; border-radius:16px;
    border:1px solid rgba(16,185,129,0.3); z-index:9999;
    text-align:center; font-size:18px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    animation:slideUp 0.4s ease; max-width:90%;
  `;
  container.innerHTML = `
    <div style="font-size:14px;color:var(--text-secondary);margin-bottom:8px;">🔑 Mot de passe temporaire</div>
    <div style="font-size:28px;font-weight:800;letter-spacing:4px;font-family:monospace;">${password}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">⏱ Ce mot de passe disparaîtra dans <span id="countdownTimer">15</span> secondes</div>
    <button onclick="copyPassword('${password}')" style="margin-top:12px;background:var(--primary-gradient);color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:600;">📋 Copier</button>
  `;
  document.body.appendChild(container);
  let seconds = 15;
  const timer = setInterval(() => {
    seconds--;
    const el = document.getElementById('countdownTimer');
    if (el) el.textContent = seconds;
    if (seconds <= 0) { clearInterval(timer); container.style.opacity='0'; container.style.transition='opacity 0.5s'; setTimeout(()=>container.remove(),500); }
  }, 1000);
}

function copyPassword(password) {
  navigator.clipboard?.writeText(password).then(() => showToast('✅ Mot de passe copié !'))
    .catch(() => { const input = document.createElement('input'); input.value = password; document.body.appendChild(input); input.select(); document.execCommand('copy'); document.body.removeChild(input); showToast('✅ Mot de passe copié !'); });
}

// ============================================================
// SHOPS
// ============================================================
async function loadShops() {
  const shops = await apiCall('/api/shops');
  if (!shops) return;
  const select = document.getElementById('shopSelect');
  select.innerHTML = '<option value="">-- Sélectionner --</option>';
  shops.forEach(s => { select.innerHTML += `<option value="${s.id}" ${currentShopId == s.id ? 'selected' : ''}>${s.name}</option>`; });
  if (!currentShopId && shops.length > 0) {
    currentShopId = shops[0].id; currentShopName = shops[0].name;
    localStorage.setItem('currentShopId', currentShopId); localStorage.setItem('currentShopName', currentShopName);
    document.getElementById('shopNameDisplay').textContent = currentShopName;
    loadDashboard();
  } else if (currentShopId) {
    const shop = shops.find(s => s.id === currentShopId);
    if (shop) { currentShopName = shop.name; document.getElementById('shopNameDisplay').textContent = currentShopName; }
  }
  return shops;
}

function changeShop() {
  const select = document.getElementById('shopSelect');
  currentShopId = parseInt(select.value);
  currentShopName = select.options[select.selectedIndex]?.text || '';
  localStorage.setItem('currentShopId', currentShopId); localStorage.setItem('currentShopName', currentShopName);
  document.getElementById('shopNameDisplay').textContent = currentShopName;
  showToast('Boutique ' + currentShopName + ' sélectionnée');
  loadDashboard();
}

// ============================================================
// BOUTIQUES - COMPLET
// ============================================================
async function loadShopsList() {
  const shops = await apiCall('/api/shops');
  if (!shops) return;
  let html = `
    <div class="card"><div class="card-header"><h3><i class="fas fa-store"></i> Mes boutiques</h3><button class="btn-primary" onclick="showCreateShop()"><i class="fas fa-plus"></i> Nouvelle</button></div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">
  `;
  shops.forEach(s => {
    html += `
      <div style="background:var(--bg-card);border-radius:var(--radius-sm);padding:16px;border:1px solid var(--border-color);transition:var(--transition);">
        <div style="display:flex;justify-content:space-between;align-items:start;">
          <div><h4 style="font-weight:700;font-size:16px;">${s.name}</h4><p style="color:var(--text-muted);font-size:13px;margin-top:4px;">${s.address || 'Pas d\'adresse'}</p><p style="color:var(--text-muted);font-size:12px;">${s.phone || 'Pas de téléphone'}</p></div>
          <div style="display:flex;gap:6px;">
            <button class="btn-secondary" onclick="selectShopDirect(${s.id},'${s.name}')" style="padding:4px 12px;font-size:12px;"><i class="fas fa-check"></i></button>
            <button class="btn-danger" onclick="deleteShop(${s.id})" style="padding:4px 12px;font-size:12px;"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    `;
  });
  if (shops.length === 0) html += `<div style="text-align:center;padding:40px;color:var(--text-muted);grid-column:1/-1;"><i class="fas fa-store" style="font-size:48px;opacity:0.3;display:block;margin-bottom:12px;"></i>Aucune boutique pour le moment</div>`;
  html += `</div></div>`;
  document.getElementById('content').innerHTML = html;
}

function selectShopDirect(id, name) {
  currentShopId = id; currentShopName = name;
  localStorage.setItem('currentShopId', id); localStorage.setItem('currentShopName', name);
  document.getElementById('shopNameDisplay').textContent = name;
  showToast('Boutique ' + name + ' sélectionnée');
  loadDashboard(); loadShops();
}

async function deleteShop(id) {
  if (confirm('Supprimer cette boutique ? Toutes les données associées seront supprimées.')) {
    await fetch(`/api/shops/${id}`, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } });
    showToast('Boutique supprimée'); loadShopsList(); loadShops();
  }
}

function showCreateShop() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:600px;margin:0 auto;">
      <div class="card-header"><h3><i class="fas fa-plus-circle"></i> Nouvelle boutique</h3></div>
      <div class="form-group"><label>Nom de la boutique *</label><input id="shopName" class="form-control" placeholder="Ma boutique" autofocus></div>
      <div class="form-group"><label>Adresse</label><input id="shopAddress" class="form-control" placeholder="Adresse"></div>
      <div class="form-group"><label>Téléphone</label><input id="shopPhone" class="form-control" placeholder="Téléphone"></div>
      <button class="btn-primary w-full" onclick="createShop()"><i class="fas fa-check"></i> Créer</button>
    </div>
  `;
}

async function createShop() {
  const name = document.getElementById('shopName').value;
  const address = document.getElementById('shopAddress').value;
  const phone = document.getElementById('shopPhone').value;
  if (!name) return showToast('Nom requis', 'error');
  await fetch('/api/shops', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ name, address, phone }) });
  showToast('Boutique créée !'); loadShopsList(); loadShops();
}

// ============================================================
// DASHBOARD
// ============================================================
async function loadDashboard() {
  if (!currentShopId) {
    await loadShops();
    if (!currentShopId) {
      document.getElementById('content').innerHTML = `
        <div class="card" style="text-align:center;padding:60px 20px;">
          <div style="font-size:64px;margin-bottom:20px;">🏪</div>
          <h2 style="font-size:24px;font-weight:700;margin-bottom:8px;">Bienvenue !</h2>
          <p style="color:var(--text-secondary);margin-bottom:24px;">Créez votre première boutique pour commencer</p>
          <button class="btn-primary" onclick="showCreateShop()"><i class="fas fa-plus"></i> Créer une boutique</button>
        </div>
      `;
      return;
    }
  }
  const stats = await apiCall(`/api/dashboard/stats?shopId=${currentShopId}`);
  if (!stats) return;
  let evolutionClass = stats.salesEvolution >= 0 ? 'positive' : 'negative';
  let evolutionSign = stats.salesEvolution >= 0 ? '+' : '';
  let html = `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-cart"></i></div><div class="stat-label">Ventes aujourd'hui</div><div class="stat-value">${stats.dailySales}</div><div class="stat-change ${evolutionClass}">${evolutionSign}${stats.salesEvolution.toFixed(1)}% vs hier</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-day"></i></div><div class="stat-label">Ventes hier</div><div class="stat-value">${stats.yesterdaySales}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-week"></i></div><div class="stat-label">Ventes (7j)</div><div class="stat-value">${stats.weeklySales}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div><div class="stat-label">Ventes totales</div><div class="stat-value">${stats.monthlySales}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-coins"></i></div><div class="stat-label">Chiffre d'affaires</div><div class="stat-value">${(stats.revenue || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-credit-card"></i></div><div class="stat-label">Dépenses</div><div class="stat-value">${(stats.totalExpenses || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-chart-pie"></i></div><div class="stat-label">Bénéfice net</div><div class="stat-value">${(stats.netProfit || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div><div class="stat-label">Stock faible</div><div class="stat-value">${stats.lowStockCount}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-times-circle"></i></div><div class="stat-label">Ruptures</div><div class="stat-value">${stats.outOfStockCount}</div></div>
    </div>
    <div class="stats-grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));">
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-shopping-bag"></i></div><div class="stat-label">Panier moyen</div><div class="stat-value">${(stats.averageCart || 0).toLocaleString()} ${currency}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-percent"></i></div><div class="stat-label">Taux de conversion</div><div class="stat-value">${(stats.conversionRate || 0).toFixed(1)}%</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-trophy"></i></div><div class="stat-label">Produit le plus rentable</div><div class="stat-value" style="font-size:18px;">${stats.topProfitProducts?.[0]?.name || '—'}</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-calendar"></i></div><div class="stat-label">Saisonnalité</div><div class="stat-value" style="font-size:18px;">${Object.keys(stats.seasonality || {}).length} mois actifs</div></div>
      <div class="stat-card"><div class="stat-icon"><i class="fas fa-bullseye"></i></div><div class="stat-label">Objectif mensuel</div><div class="stat-value">${(stats.monthlyTarget || 0).toLocaleString()} ${currency}</div></div>
    </div>
  `;
  if (stats.dailyChart) {
    html += `<div class="card"><div class="card-header"><h3><i class="fas fa-chart-line"></i> Évolution des ventes</h3></div><canvas id="salesChart"></canvas></div>`;
  }
  if (stats.topProducts?.length) {
    html += `<div class="card"><div class="card-header"><h3><i class="fas fa-trophy"></i> Top produits</h3></div><canvas id="topChart"></canvas></div>`;
  }
  if (stats.topSellers?.length) {
    html += `<div class="card"><div class="card-header"><h3><i class="fas fa-crown"></i> Meilleurs vendeurs</h3></div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;">${stats.topSellers.map(s => `<div style="background:var(--bg-card);padding:12px 16px;border-radius:var(--radius-sm);display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border-color);"><span style="font-weight:600;">${s.name}</span><span style="color:var(--primary-light);font-weight:700;">${s.revenue.toLocaleString()} ${currency}</span></div>`).join('')}</div></div>`;
  }
  document.getElementById('content').innerHTML = html;
  if (stats.dailyChart && document.getElementById('salesChart')) {
    if (charts.salesChart) charts.salesChart.destroy();
    charts.salesChart = new Chart(document.getElementById('salesChart'), {
      type:'line',
      data:{ labels:stats.dailyChart.map(d=>d.date), datasets:[{ label:'Ventes', data:stats.dailyChart.map(d=>d.count), borderColor:'#7C3AED', backgroundColor:'rgba(124,58,237,0.1)', tension:0.3, fill:true, pointBackgroundColor:'#7C3AED', pointBorderColor:'#fff', pointBorderWidth:2, pointRadius:4 }] },
      options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, grid:{ color:'rgba(255,255,255,0.05)' } }, x:{ grid:{ display:false } } } }
    });
  }
  if (stats.topProducts && document.getElementById('topChart')) {
    if (charts.topChart) charts.topChart.destroy();
    charts.topChart = new Chart(document.getElementById('topChart'), {
      type:'bar',
      data:{ labels:stats.topProducts.map(p=>p.name), datasets:[{ label:'Quantités vendues', data:stats.topProducts.map(p=>p.quantitySold), backgroundColor:'#7C3AED', borderRadius:8, barThickness:40 }] },
      options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, grid:{ color:'rgba(255,255,255,0.05)' } }, x:{ grid:{ display:false } } } }
    });
  }
}

// ============================================================
// PRODUITS
// ============================================================
async function loadProducts(page = 1) {
  if (!currentShopId) return showToast('Sélectionnez une boutique', 'error');
  const prods = await apiCall(`/api/products?shopId=${currentShopId}`);
  if (!prods) return;
  productsCache = prods;
  const totalPages = Math.ceil(prods.length / ITEMS_PER_PAGE);
  const start = (page - 1) * ITEMS_PER_PAGE;
  const paginated = prods.slice(start, start + ITEMS_PER_PAGE);
  let html = `
    <div class="card"><div class="card-header"><h3><i class="fas fa-box"></i> Produits</h3><button class="btn-primary" onclick="showCreateProduct()"><i class="fas fa-plus"></i> Ajouter</button></div>
    <div class="table-container"><table><thead><tr><th>Photo</th><th>Nom</th><th>Stock</th><th>Prix</th><th>Péremption</th><th>Arrivage</th><th>Actions</th></tr></thead><tbody>
  `;
  paginated.forEach(p => {
    const stockClass = p.quantity <= p.alertThreshold ? 'text-danger' : '';
    const expiryWarning = p.expiryDate ? new Date(p.expiryDate) < new Date() ? '⚠️' : '' : '';
    html += `
      <tr>
        <td>${p.image ? `<img src="${p.image}" style="width:50px;height:50px;border-radius:8px;object-fit:cover;border:1px solid var(--border-color);" alt="${p.name}">` : '<span style="color:var(--text-muted);font-size:20px;">📦</span>'}</td>
        <td><strong>${p.name}</strong></td>
        <td class="${stockClass}">${p.quantity}</td>
        <td>${p.sellingPrice.toLocaleString()} ${currency}</td>
        <td>${p.expiryDate ? new Date(p.expiryDate).toLocaleDateString() + ' ' + expiryWarning : '-'}</td>
        <td><div style="display:flex;gap:6px;align-items:center;"><input type="number" id="restockQty_${p.id}" placeholder="Qty" style="width:70px;padding:6px 8px;border:1px solid var(--border-color);border-radius:8px;background:var(--bg-card);color:var(--text-primary);"><button class="btn-success" onclick="restockProduct(${p.id})" style="padding:4px 12px;font-size:12px;"><i class="fas fa-plus"></i></button></div></td>
        <td><button class="btn-secondary" onclick="showProductVariants(${p.id})" style="padding:4px 10px;font-size:11px;"><i class="fas fa-layer-group"></i></button><button class="btn-secondary" onclick="showProductPhoto(${p.id})" style="padding:4px 10px;font-size:11px;"><i class="fas fa-camera"></i></button><button class="btn-danger" onclick="deleteProduct(${p.id})" style="padding:4px 12px;font-size:12px;"><i class="fas fa-trash"></i></button></td>
      </tr>
    `;
  });
  if (paginated.length === 0) html += `<tr><td colspan="7" class="text-center" style="padding:24px;color:var(--text-muted);">Aucun produit</td></tr>`;
  html += `</tbody></table></div>`;
  if (totalPages > 1) {
    html += `<div class="pagination">${Array.from({length: totalPages}, (_, i) => i + 1).map(p => `<button class="${p === page ? 'active' : ''}" onclick="loadProducts(${p})">${p}</button>`).join('')}</div>`;
  }
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

function showCreateProduct() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:600px;margin:0 auto;">
      <div class="card-header"><h3><i class="fas fa-tag"></i> Nouveau produit</h3></div>
      <div class="form-row"><div class="form-group"><label>Nom *</label><input id="prodName" class="form-control" placeholder="Nom du produit" autofocus></div><div class="form-group"><label>Prix vente (${currency})</label><input id="prodPrice" type="number" class="form-control" placeholder="0"></div></div>
      <div class="form-row"><div class="form-group"><label>Quantité stock</label><input id="prodQty" type="number" class="form-control" placeholder="0"></div><div class="form-group"><label>Seuil alerte</label><input id="prodAlert" type="number" class="form-control" value="5"></div></div>

async function loadProductsForSale() {
  productsCache = await apiCall(`/api/products?shopId=${currentShopId}`);
  return productsCache;
}

function filterProducts(search) {
  const term = search.toLowerCase();
  return productsCache.filter(p => p.name.toLowerCase().includes(term) || (p.barcode && p.barcode.includes(term)));
}

async function showSale() {
  await loadProductsForSale();
  let productsHtml = '<option value="">-- Choisir --</option>';
  productsCache.forEach(p => {
    productsHtml += `<option value="${p.id}" data-price="${p.sellingPrice}" data-name="${p.name}" data-stock="${p.quantity}">${p.name} - ${p.sellingPrice} ${currency} (Stock: ${p.quantity})</option>`;
  });
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:700px;margin:0 auto;">
      <div class="card-header"><h3><i class="fas fa-cash-register"></i> Enregistrer une vente</h3></div>
      <div class="barcode-scanner" id="scannerBtn"><i class="fas fa-camera"></i><p>Scanner un code-barres</p></div>
      <div class="form-group"><label>Produit</label><div class="autocomplete-container"><input id="productSearch" class="form-control" placeholder="Rechercher par nom ou code-barres..." oninput="filterProductList()"><div id="autocompleteList" class="autocomplete-dropdown"></div></div><select id="saleProduct" class="form-control mt-2" onchange="updateProductInfo()" style="display:none">${productsHtml}</select></div>
      <div id="productInfo" class="alert-box info" style="display:none;"></div>
      <div class="form-row"><div class="form-group"><label>Quantité</label><input id="saleQty" type="number" class="form-control" value="1" min="1" onchange="calculateSaleTotal()"></div><div class="form-group"><label>Prix unitaire (${currency})</label><input id="salePrice" type="number" class="form-control" oninput="calculateSaleTotal()"></div></div>
      <div class="form-group"><label>Nom du client</label><input id="customerName" class="form-control" placeholder="Client"></div>
      <div class="form-group"><label>Moyen de paiement</label><select id="paymentMethod" class="form-control"><option value="cash">💵 Espèces</option><option value="mobile_money">📱 Mobile Money</option><option value="card">💳 Carte</option><option value="bank_transfer">🏦 Virement</option><option value="other">🔄 Autre</option></select></div>
      <div class="form-group"><label>Total</label><input id="saleTotal" class="form-control" readonly style="font-weight:700;font-size:20px;color:var(--primary-light);"></div>
      <div id="priceAlert" class="alert-box warning" style="display:none;"></div>
      <button class="btn-primary w-full" onclick="recordSaleWithPrice()"><i class="fas fa-check"></i> Vendre</button>
      <div id="performanceMessage" class="alert-box success" style="display:none;margin-top:12px;"></div>
      <button class="btn-secondary w-full mt-3" onclick="toggleSaleCalculator()"><i class="fas fa-calculator"></i> ${saleCalculatorVisible ? 'Masquer' : 'Afficher'} calculatrice</button>
      <div id="saleCalculator" style="display:${saleCalculatorVisible ? 'block' : 'none'};" class="calculator mt-2">
        <div class="calculator-display" id="calcDisplaySale">0</div>
        <div class="calculator-buttons">
          <button class="calc-btn" onclick="calcAppendSale('7')">7</button><button class="calc-btn" onclick="calcAppendSale('8')">8</button><button class="calc-btn" onclick="calcAppendSale('9')">9</button><button class="calc-btn calc-btn-op" onclick="calcOperationSale('/')">÷</button>
          <button class="calc-btn" onclick="calcAppendSale('4')">4</button><button class="calc-btn" onclick="calcAppendSale('5')">5</button><button class="calc-btn" onclick="calcAppendSale('6')">6</button><button class="calc-btn calc-btn-op" onclick="calcOperationSale('*')">×</button>
          <button class="calc-btn" onclick="calcAppendSale('1')">1</button><button class="calc-btn" onclick="calcAppendSale('2')">2</button><button class="calc-btn" onclick="calcAppendSale('3')">3</button><button class="calc-btn calc-btn-op" onclick="calcOperationSale('-')">-</button>
          <button class="calc-btn" onclick="calcAppendSale('0')">0</button><button class="calc-btn" onclick="calcAppendSale('.')">.</button><button class="calc-btn" onclick="calcClearSale()">C</button><button class="calc-btn calc-btn-op" onclick="calcOperationSale('+')">+</button>
          <button class="calc-btn calc-btn-op" style="grid-column:span 4;" onclick="calcEqualSale()">=</button>
        </div>
      </div>
    </div>
  `;
  setupScanner();
  updateProductInfo();
}

function filterProductList() {
  const search = document.getElementById('productSearch').value;
  const filtered = filterProducts(search);
  const listDiv = document.getElementById('autocompleteList');
  if (filtered.length === 0 || search === '') { listDiv.style.display = 'none'; return; }
  listDiv.style.display = 'block';
  listDiv.innerHTML = filtered.map(p => `<div class="autocomplete-item" onclick="selectProduct(${p.id}, '${p.name}', ${p.sellingPrice}, ${p.quantity})">${p.name} - ${p.sellingPrice} ${currency} (Stock: ${p.quantity})</div>`).join('');
}

function selectProduct(id, name, price, stock) {
  document.getElementById('productSearch').value = name;
  document.getElementById('autocompleteList').style.display = 'none';
  document.getElementById('saleProduct').value = id;
  updateProductInfo();
}

function updateProductInfo() {
  const select = document.getElementById('saleProduct');
  const selectedOption = select.options[select.selectedIndex];
  if (selectedOption && selectedOption.value) {
    const price = selectedOption.dataset.price;
    const name = selectedOption.dataset.name;
    const stock = selectedOption.dataset.stock;
    document.getElementById('productSearch').value = name;
    const info = document.getElementById('productInfo');
    info.innerHTML = `<i class="fas fa-info-circle"></i> ${name} - Prix recommandé: ${price} ${currency} - Stock: ${stock}`;
    info.style.display = 'block';
    document.getElementById('salePrice').value = price;
    calculateSaleTotal();
  }
}

function calculateSaleTotal() {
  const qty = parseFloat(document.getElementById('saleQty').value) || 0;
  const price = parseFloat(document.getElementById('salePrice').value) || 0;
  const total = qty * price;
  document.getElementById('saleTotal').value = total.toLocaleString() + ' ' + currency;
  checkSalePrice();
}

function checkSalePrice() {
  const select = document.getElementById('saleProduct');
  const selectedOption = select.options[select.selectedIndex];
  const alertDiv = document.getElementById('priceAlert');
  if (selectedOption && selectedOption.value) {
    const recommended = parseInt(selectedOption.dataset.price);
    const entered = parseInt(document.getElementById('salePrice').value) || 0;
    if (entered > recommended) {
      alertDiv.innerHTML = `<i class="fas fa-smile-wink"></i> Waouh! +${entered - recommended} ${currency} au-dessus du prix!`;
      alertDiv.style.display = 'block';
      alertDiv.className = 'alert-box success';
    } else if (entered < recommended) {
      alertDiv.innerHTML = `<i class="fas fa-frown"></i> Attention: ${recommended - entered} ${currency} en dessous du prix recommandé`;
      alertDiv.style.display = 'block';
      alertDiv.className = 'alert-box warning';
    } else {
      alertDiv.style.display = 'none';
    }
  }
}

function setupScanner() {
  document.getElementById('scannerBtn').onclick = () => {
    const code = prompt('Entrez le code-barres du produit:');
    if (code) {
      const product = productsCache.find(p => p.barcode === code);
      if (product) {
        document.getElementById('productSearch').value = product.name;
        document.getElementById('saleProduct').value = product.id;
        updateProductInfo();
        showToast('Produit trouvé: ' + product.name);
      } else {
        showToast('Produit non trouvé', 'error');
      }
    }
  };
}

function calcAppendSale(num) { saleCalcValue += num; document.getElementById('calcDisplaySale').innerText = saleCalcValue; }
function calcClearSale() { saleCalcValue = ''; saleCalcOperator = ''; saleCalcPrevious = ''; document.getElementById('calcDisplaySale').innerText = '0'; }
function calcOperationSale(op) { if (saleCalcValue) { saleCalcPrevious = saleCalcValue; saleCalcValue = ''; saleCalcOperator = op; } }
function calcEqualSale() {
  if (saleCalcPrevious && saleCalcValue && saleCalcOperator) {
    let result = 0;
    const a = parseFloat(saleCalcPrevious); const b = parseFloat(saleCalcValue);
    if (saleCalcOperator === '+') result = a + b;
    else if (saleCalcOperator === '-') result = a - b;
    else if (saleCalcOperator === '*') result = a * b;
    else if (saleCalcOperator === '/') result = a / b;
    document.getElementById('calcDisplaySale').innerText = result;
    document.getElementById('salePrice').value = Math.round(result);
    saleCalcValue = result.toString();
    saleCalcPrevious = '';
    calculateSaleTotal();
  }
}

function toggleSaleCalculator() {
  saleCalculatorVisible = !saleCalculatorVisible;
  const calc = document.getElementById('saleCalculator');
  if (calc) calc.style.display = saleCalculatorVisible ? 'block' : 'none';
}

async function recordSaleWithPrice() {
  const select = document.getElementById('saleProduct');
  if (!select.value) return showToast('Sélectionnez un produit', 'error');
  const productId = parseInt(select.value);
  const quantity = parseInt(document.getElementById('saleQty').value);
  const customPrice = parseInt(document.getElementById('salePrice').value);
  const customerName = document.getElementById('customerName').value || 'Client';
  const paymentMethod = document.getElementById('paymentMethod').value;
  const res = await fetch('/api/sales', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ productId, quantity, shopId: currentShopId, customPrice, customerName, paymentMethod }) });
  const data = await res.json();
  if (res.ok) {
    showToast(`Vente enregistrée ! ${quantity} x ${customPrice} = ${quantity * customPrice} ${currency}`);
    if (data.performanceMessage) {
      const perf = document.getElementById('performanceMessage');
      perf.innerHTML = data.performanceMessage;
      perf.style.display = 'block';
    }
    loadDashboard();
  } else {
    showToast(data.error, 'error');
  }
}

async function loadSales(page = 1) {
  if (!currentShopId) return showToast('Sélectionnez une boutique', 'error');
  const salesList = await apiCall(`/api/sales?shopId=${currentShopId}`);
  if (!salesList) return;
  const totalPages = Math.ceil(salesList.length / ITEMS_PER_PAGE);
  const start = (page - 1) * ITEMS_PER_PAGE;
  const paginated = salesList.slice(start, start + ITEMS_PER_PAGE);
  let html = `
    <div class="card"><div class="card-header"><h3><i class="fas fa-receipt"></i> Historique des ventes</h3></div>
    <div class="table-container"><table><thead><tr><th>Date</th><th>Client</th><th>Produit</th><th>Vendeur</th><th>Qte</th><th>Total</th><th>Paiement</th><th>PDF</th><th>Annuler</th></tr></thead><tbody>
  `;
  paginated.forEach(s => {
    const paymentLabel = s.paymentMethod === 'cash' ? '💵 Espèces' : s.paymentMethod === 'mobile_money' ? '📱 Mobile Money' : s.paymentMethod === 'card' ? '💳 Carte' : s.paymentMethod === 'bank_transfer' ? '🏦 Virement' : '🔄 Autre';
    html += `
      <tr>
        <td style="white-space:nowrap;">${new Date(s.date).toLocaleString()}</td>
        <td>${s.customerName || '-'}</td>
        <td>${s.productName}</td>
        <td>${s.sellerName || '-'}</td>
        <td>${s.quantity}</td>
        <td><strong>${s.total.toLocaleString()} ${currency}</strong></td>
        <td><span class="badge-primary">${paymentLabel}</span></td>
        <td><button class="btn-secondary" onclick="downloadPDF(${s.id})" style="padding:4px 12px;font-size:12px;"><i class="fas fa-file-pdf"></i></button></td>
        <td><button class="btn-danger" onclick="cancelSale(${s.id})" style="padding:4px 12px;font-size:12px;"><i class="fas fa-times"></i></button></td>
      </tr>
    `;
  });
  if (paginated.length === 0) html += `<tr><td colspan="9" class="text-center" style="padding:24px;color:var(--text-muted);">Aucune vente</td></tr>`;
  html += `</tbody></table></div>`;
  if (totalPages > 1) {
    html += `<div class="pagination">${Array.from({length: totalPages}, (_, i) => i + 1).map(p => `<button class="${p === page ? 'active' : ''}" onclick="loadSales(${p})">${p}</button>`).join('')}</div>`;
  }
  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

async function cancelSale(id) {
  if (confirm('Annuler cette vente ? (stock restauré)')) {
    const res = await fetch(`/api/sales/${id}/cancel`, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token } });
    if (res.ok) { showToast('Vente annulée'); loadSales(); loadDashboard(); } 
    else { const err = await res.json(); showToast(err.error, 'error'); }
  }
}

async function addExpense() {

  const date = document.getElementById('expenseDate').value || new Date().toISOString().split('T')[0];

function showCalculatorPage() {
  document.getElementById('content').innerHTML = `
    <div class="card" style="max-width:500px;margin:0 auto;">
      <div class="card-header"><h3><i class="fas fa-calculator"></i> Calculatrice</h3></div>
      <div class="calculator">
        <div class="calculator-display" id="calcDisplayMain">0</div>
        <div class="calculator-buttons">
          <button class="calc-btn" onclick="calcAppendMain('7')">7</button><button class="calc-btn" onclick="calcAppendMain('8')">8</button><button class="calc-btn" onclick="calcAppendMain('9')">9</button><button class="calc-btn calc-btn-op" onclick="calcOperationMain('/')">÷</button>
          <button class="calc-btn" onclick="calcAppendMain('4')">4</button><button class="calc-btn" onclick="calcAppendMain('5')">5</button><button class="calc-btn" onclick="calcAppendMain('6')">6</button><button class="calc-btn calc-btn-op" onclick="calcOperationMain('*')">×</button>
          <button class="calc-btn" onclick="calcAppendMain('1')">1</button><button class="calc-btn" onclick="calcAppendMain('2')">2</button><button class="calc-btn" onclick="calcAppendMain('3')">3</button><button class="calc-btn calc-btn-op" onclick="calcOperationMain('-')">-</button>
          <button class="calc-btn" onclick="calcAppendMain('0')">0</button><button class="calc-btn" onclick="calcAppendMain('.')">.</button><button class="calc-btn" onclick="calcClearMain()">C</button><button class="calc-btn calc-btn-op" onclick="calcOperationMain('+')">+</button>
          <button class="calc-btn calc-btn-op" style="grid-column:span 4;" onclick="calcEqualMain()">=</button>
        </div>
      </div>
    </div>
  `;
}

function calcAppendMain(num) { calcValue += num; document.getElementById('calcDisplayMain').innerText = calcValue; }
function calcClearMain() { calcValue = ''; calcOperator = ''; calcPrevious = ''; document.getElementById('calcDisplayMain').innerText = '0'; }
function calcOperationMain(op) { if (calcValue) { calcPrevious = calcValue; calcValue = ''; calcOperator = op; } }
function calcEqualMain() {
  if (calcPrevious && calcValue && calcOperator) {
    let result = 0;
    const a = parseFloat(calcPrevious); const b = parseFloat(calcValue);
    if (calcOperator === '+') result = a + b;
    else if (calcOperator === '-') result = a - b;
    else if (calcOperator === '*') result = a * b;
    else if (calcOperator === '/') result = a / b;
    document.getElementById('calcDisplayMain').innerText = result;
    calcValue = result.toString();
    calcPrevious = '';
  }
}

// ============================================================
// MEMORY GAME
// ============================================================
function showMiniGame() {
  const emojis = ['🛒', '📦', '💰', '📊', '👥', '🏪', '🤖', '🎮'];
  gameCards = [...emojis, ...emojis];
  for (let i = gameCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [gameCards[i], gameCards[j]] = [gameCards[j], gameCards[i]];
  }
  gameFlipped = new Array(gameCards.length).fill(false);
  gameMatched = new Array(gameCards.length).fill(false);
  gameVictory = false;
  let html = `
    <div class="card" style="max-width:500px;margin:0 auto;">
      <div class="card-header"><h3><i class="fas fa-gamepad"></i> Memory Game</h3></div>
      <p class="text-muted text-center mb-3">Trouvez toutes les paires !</p>
      <div class="memory-game" id="memoryGame">
  `;
  gameCards.forEach((card, i) => {
    html += `<div class="memory-card ${gameMatched[i] ? 'matched' : ''}" data-idx="${i}" onclick="flipCard(${i})">${gameFlipped[i] || gameMatched[i] ? card : '?'}</div>`;
  });
  html += `
      </div>
      <div id="victoryMessage" style="display:none;" class="victory-message">🎉 Félicitations ! Vous avez trouvé toutes les paires !</div>
      <button class="btn-primary w-full mt-3" onclick="showMiniGame()"><i class="fas fa-redo"></i> Nouvelle partie</button>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

function flipCard(idx) {
  if (gameMatched[idx] || gameFlipped[idx] || gameVictory) return;
  gameFlipped[idx] = true;
  updateGameDisplay();
  const flippedIndices = gameFlipped.map((f, i) => f && !gameMatched[i] ? i : -1).filter(i => i !== -1);
  if (flippedIndices.length === 2) {
    setTimeout(() => {
      if (gameCards[flippedIndices[0]] === gameCards[flippedIndices[1]]) {
        gameMatched[flippedIndices[0]] = true;
        gameMatched[flippedIndices[1]] = true;
      }
      gameFlipped[flippedIndices[0]] = false;
      gameFlipped[flippedIndices[1]] = false;
      updateGameDisplay();
      if (gameMatched.every(m => m === true)) {
        gameVictory = true;
        const victoryMsg = document.getElementById('victoryMessage');
        if (victoryMsg) { victoryMsg.style.display = 'block'; victoryMsg.innerHTML = '🎉 Félicitations ! Vous avez trouvé toutes les paires !'; showToast('🎉 Félicitations ! Vous avez trouvé toutes les paires !'); }
      }
    }, 500);
  }
}

function updateGameDisplay() {
  const container = document.getElementById('memoryGame');
  if (!container) return;
  const cards = container.children;
  for (let i = 0; i < cards.length; i++) {
    if (gameMatched[i]) { cards[i].innerHTML = gameCards[i]; cards[i].className = 'memory-card matched'; }
    else if (gameFlipped[i]) { cards[i].innerHTML = gameCards[i]; cards[i].className = 'memory-card flipped'; }
    else { cards[i].innerHTML = '?'; cards[i].className = 'memory-card'; }
  }
}

function showAI() {

function addUserMessage(msg) {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'chat-message user';
  div.innerHTML = `<div class="chat-avatar"><i class="fas fa-user"></i></div><div class="chat-bubble">${msg}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addBotMessage(msg) {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'chat-message bot';
  div.innerHTML = `<div class="chat-avatar"><i class="fas fa-robot"></i></div><div class="chat-bubble">${msg.replace(/\n/g, '<br>')}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addThinking() {
  const container = document.getElementById('chatContainer');
  const div = document.createElement('div');
  div.className = 'chat-message bot';
  div.id = 'thinkingMsg';
  div.innerHTML = `<div class="chat-avatar"><i class="fas fa-robot"></i></div><div class="chat-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeThinking() { const el = document.getElementById('thinkingMsg'); if (el) el.remove(); }

function updateSuggestions() {
  const suggestionsDiv = document.getElementById('suggestions');
  if (!suggestionsDiv) return;
  suggestionsDiv.innerHTML = `
    <button class="suggestion-btn" onclick="askSuggestion('Combien de ventes aujourd\'hui ?')">📊 Ventes aujourd'hui</button>
    <button class="suggestion-btn" onclick="askSuggestion('Combien de ventes hier ?')">📅 Ventes hier</button>
    <button class="suggestion-btn" onclick="askSuggestion('Quel est le produit le plus vendu ?')">🏆 Top produit</button>
    <button class="suggestion-btn" onclick="askSuggestion('Quel est le meilleur vendeur ?')">🥇 Meilleur vendeur</button>
    <button class="suggestion-btn" onclick="askSuggestion('Faut-il commander du stock ?')">📦 Stock</button>
    <button class="suggestion-btn" onclick="askSuggestion('Quel est mon benefice ?')">💰 Bénéfice</button>
    <button class="suggestion-btn" onclick="askSuggestion('Prediction pour demain ?')">🔮 Prédiction</button>
  `;
}

function askSuggestion(question) { document.getElementById('aiQuestion').value = question; askAI(); }

async function askAI() {
  const question = document.getElementById('aiQuestion').value;
  if (!question) return;
  addUserMessage(question);
  document.getElementById('aiQuestion').value = '';
  addThinking();
  try {
    const res = await fetch('/api/ai/ask', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ question, shopId: currentShopId, conversationHistory: chatHistory }) });
    const data = await res.json();
    removeThinking();
    addBotMessage(data.answer);
    chatHistory.push({ role: 'user', content: question });
    chatHistory.push({ role: 'assistant', content: data.answer });
  } catch (error) {
    removeThinking();
    addBotMessage('Désolé, une erreur s\'est produite.');
  }
}
